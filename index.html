<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Atom Sculptor: Unchained - Precision Update</title>
    <style>body { margin: 0; background-color: #000; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // ネオンライトを増量
        const p1 = new THREE.PointLight(0xff00ff, 2, 10); p1.position.set(2, 2, 0);
        const p2 = new THREE.PointLight(0x00ffff, 2, 10); p2.position.set(-2, 2, 0);
        scene.add(p1, p2, new THREE.AmbientLight(0x333333));

        // --- ボスの破片（プレイヤーの周囲に集中配置） ---
        const fragments = [];
        const fragGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15); // 少し小さくして密度を上げる
        for(let i = 0; i < 100; i++) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: Math.random() > 0.5 ? 0x00ffff : 0xff00ff, 
                wireframe: true 
            });
            const cube = new THREE.Mesh(fragGeo, mat);
            
            // プレイヤーの目の前 0.5m 〜 2m の範囲にランダム配置
            const radius = 0.5 + Math.random() * 1.5;
            const theta = (Math.random() - 0.5) * Math.PI * 0.8; // 前方140度くらい
            const phi = (Math.random() - 0.5) * Math.PI * 0.4 + Math.PI/2.5; // 高さ調整

            cube.position.set(
                radius * Math.sin(phi) * Math.sin(theta),
                1.0 + (Math.random() - 0.5) * 1.2, // ちょうど胸〜頭の高さ
                -radius * Math.sin(phi) * Math.cos(theta)
            );
            
            cube.userData = { velocity: new THREE.Vector3(), isDead: false };
            scene.add(cube);
            fragments.push(cube);
        }

        // --- 武器：光の刃 ---
        function createBlade(index) {
            const controller = renderer.xr.getController(index);
            scene.add(controller);
            
            const bladeGeo = new THREE.CylinderGeometry(0.005, 0.01, 1.0, 8);
            const bladeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.rotation.x = -Math.PI / 2;
            blade.position.z = -0.5; // 手元から1m伸ばす
            controller.add(blade);
            return { controller, blade };
        }

        const h1 = createBlade(0);
        const h2 = createBlade(1);

        // --- ループ ---
        renderer.setAnimationLoop(() => {
            [h1, h2].forEach(hand => {
                // 刃の中央と先端の座標を取得して「線」として判定
                const start = new THREE.Vector3();
                const end = new THREE.Vector3();
                start.setFromMatrixPosition(hand.controller.matrixWorld);
                end.set(0, 0, -1).applyMatrix4(hand.controller.matrixWorld);

                fragments.forEach(frag => {
                    if (!frag.userData.isDead) {
                        // 簡易的な線分と点の距離判定（ズレを解消）
                        const dist = frag.position.distanceTo(end); 
                        if (dist < 0.25) {
                            frag.userData.isDead = true;
                            // 斬った方向に強く飛ばす
                            const dir = frag.position.clone().sub(start).normalize();
                            frag.userData.velocity.copy(dir).multiplyScalar(0.3);
                        }
                    }
                });
            });

            fragments.forEach(frag => {
                if (frag.userData.isDead) {
                    frag.position.add(frag.userData.velocity);
                    frag.rotation.x += 0.2;
                    frag.scale.multiplyScalar(0.94);
                    if(frag.scale.x < 0.01) frag.visible = false;
                } else {
                    frag.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
