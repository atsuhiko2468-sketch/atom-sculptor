<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atom Sculptor: Unchained</title>
    <style>
        body { margin: 0; background-color: #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        // 1. シーン・カメラ・レンダラーの初期化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. VRボタンの追加
        document.body.appendChild(VRButton.createButton(renderer));

        // 3. ライティング
        const light = new THREE.DirectionalLight(0xff00ff, 1);
        light.position.set(1, 10, 1);
        scene.add(light, new THREE.AmbientLight(0x404040));

        // 4. ボスの破片（グリッド）の生成
        const fragments = [];
        const fragGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        for(let i = 0; i < 60; i++) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: i % 2 === 0 ? 0xff00ff : 0x00ffff, 
                wireframe: true 
            });
            const cube = new THREE.Mesh(fragGeo, mat);
            // プレイヤーの目の前（z = -2〜-4）に散りばめる
            cube.position.set(
                (Math.random() - 0.5) * 4,
                1.5 + (Math.random() - 0.5) * 2,
                -3 + (Math.random() - 0.5) * 2
            );
            cube.userData = { velocity: new THREE.Vector3(), isDead: false };
            scene.add(cube);
            fragments.push(cube);
        }

        // 5. 両手のコントローラー設定
        function createBlade(controller) {
            const bladeGeo = new THREE.CylinderGeometry(0.01, 0.01, 1, 8);
            const bladeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const blade = new THREE.Mesh(bladeGeo, bladeMat);
            blade.rotation.x = -Math.PI / 2;
            blade.position.z = -0.5;
            controller.add(blade);
            return blade;
        }

        const c0 = renderer.xr.getController(0);
        scene.add(c0);
        const blade0 = createBlade(c0);

        const c1 = renderer.xr.getController(1);
        scene.add(c1);
        const blade1 = createBlade(c1);

        // 6. メインループ
        renderer.setAnimationLoop(() => {
            // 当たり判定（両手分）
            [blade0, blade1].forEach(b => {
                const tip = new THREE.Vector3();
                tip.setFromMatrixPosition(b.matrixWorld);
                fragments.forEach(frag => {
                    if (!frag.userData.isDead && tip.distanceTo(frag.position) < 0.25) {
                        frag.userData.isDead = true;
                        frag.userData.velocity.set(
                            (Math.random() - 0.5) * 0.1,
                            (Math.random() - 0.5) * 0.1,
                            (Math.random() - 0.5) * 0.1
                        );
                    }
                });
            });

            // 破片のアニメーション
            fragments.forEach(frag => {
                if (frag.userData.isDead) {
                    frag.position.add(frag.userData.velocity);
                    frag.scale.multiplyScalar(0.95);
                } else {
                    frag.rotation.y += 0.01;
                }
            });

            renderer.render(scene, camera);
        });

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
