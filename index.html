<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Atom Sculptor: Unchained - Sculpt & Shatter</title>
    <style>body { margin: 0; background-color: #000; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 8);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const p1 = new THREE.PointLight(0xff00ff, 2, 10); p1.position.set(2, 2, 0);
        const p2 = new THREE.PointLight(0x00ffff, 2, 10); p2.position.set(-2, 2, 0);
        scene.add(p1, p2, new THREE.AmbientLight(0x333333));

        // --- 1. 敵（エネミー）と破片（パーティクル）の管理 ---
        const enemies = [];
        const particles = [];
        const fragGeo = new THREE.BoxGeometry(0.15, 0.15, 0.15);
        const particleGeo = new THREE.BoxGeometry(0.04, 0.04, 0.04); // 破片用ジオメトリ

        function spawnEnemy() {
            const isCyan = Math.random() > 0.5;
            const mat = new THREE.MeshBasicMaterial({ color: isCyan ? 0x00ffff : 0xff00ff, wireframe: true });
            const enemy = new THREE.Mesh(fragGeo, mat);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 0.5 + Math.random() * 2.0;
            enemy.position.set(Math.cos(angle) * radius, 0.5 + Math.random() * 1.5, Math.sin(angle) * radius);
            
            enemy.userData = { isDead: false, rotSpeed: (Math.random() - 0.5) * 0.05, floatOffset: Math.random() * 10, color: mat.color };
            scene.add(enemy);
            enemies.push(enemy);
        }

        for(let i = 0; i < 60; i++) spawnEnemy();

        // 敵が破壊されたときの「シャッター（粉砕）」エフェクト
        function shatterEnemy(enemy) {
            enemy.userData.isDead = true;
            enemy.visible = false; // 本体を消す

            // 8つの小さな破片を生成
            for(let i = 0; i < 8; i++) {
                const pMat = new THREE.MeshBasicMaterial({ color: enemy.userData.color });
                const p = new THREE.Mesh(particleGeo, pMat);
                p.position.copy(enemy.position);
                
                // 爆発するようにランダムな方向へ飛ばす
                p.userData = {
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 0.1,
                        (Math.random() - 0.5) * 0.1,
                        (Math.random() - 0.5) * 0.1
                    ),
                    life: 1.0 // 寿命（スケールダウン用）
                };
                scene.add(p);
                particles.push(p);
            }
        }

        // --- 2. スカルプト（光の軌跡）システム ---
        const trails = []; // 描かれた軌跡のリスト
        
        function setupController(index) {
            const controller = renderer.xr.getController(index);
            scene.add(controller);

            // 手元のポインター（筆先）
            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            tip.position.z = -0.1;
            controller.add(tip);

            controller.userData = { isDrawing: false, lastPos: new THREE.Vector3(), activeTrail: null };

            // トリガー操作で描画開始/終了
            controller.addEventListener('selectstart', () => {
                controller.userData.isDrawing = true;
                controller.userData.lastPos.setFromMatrixPosition(tip.matrixWorld);
                
                // 新しい軌跡（Line）を作成
                const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1.0, linewidth: 3 });
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(300), 3)); // 最大100頂点
                const line = new THREE.Line(geometry, material);
                scene.add(line);
                
                controller.userData.activeTrail = {
                    mesh: line,
                    points: [controller.userData.lastPos.clone()],
                    age: 0,
                    isFinished: false
                };
                trails.push(controller.userData.activeTrail);
            });

            controller.addEventListener('selectend', () => {
                controller.userData.isDrawing = false;
                if(controller.userData.activeTrail) {
                    controller.userData.activeTrail.isFinished = true; // 描画終了、寿命カウントダウン開始
                }
            });

            return { controller, tip };
        }

        const h1 = setupController(0);
        const h2 = setupController(1);

        // --- 3. メインループ（最適化された判定とライフサイクル） ---
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // スカルプト描画処理
            [h1, h2].forEach(hand => {
                const ctrl = hand.controller;
                const currentPos = new THREE.Vector3().setFromMatrixPosition(hand.tip.matrixWorld);

                if (ctrl.userData.isDrawing && ctrl.userData.activeTrail) {
                    const trail = ctrl.userData.activeTrail;
                    // 前回位置から一定距離離れたら頂点を追加
                    if (currentPos.distanceTo(ctrl.userData.lastPos) > 0.05 && trail.points.length < 100) {
                        trail.points.push(currentPos.clone());
                        
                        // BufferGeometryの更新
                        const positions = trail.mesh.geometry.attributes.position.array;
                        for(let i=0; i<trail.points.length; i++) {
                            positions[i*3] = trail.points[i].x;
                            positions[i*3+1] = trail.points[i].y;
                            positions[i*3+2] = trail.points[i].z;
                        }
                        trail.mesh.geometry.setDrawRange(0, trail.points.length);
                        trail.mesh.geometry.attributes.position.needsUpdate = true;
                        
                        ctrl.userData.lastPos.copy(currentPos);
                    }

                    // --- 高速移動向け当たり判定（最新の線分で敵を斬る） ---
                    if (trail.points.length > 1) {
                        const pStart = trail.points[trail.points.length - 2];
                        const pEnd = trail.points[trail.points.length - 1];
                        const lineSegment = new THREE.Line3(pStart, pEnd);
                        const closest = new THREE.Vector3();

                        enemies.forEach(enemy => {
                            if (!enemy.userData.isDead) {
                                lineSegment.closestPointToPoint(enemy.position, true, closest);
                                if (closest.distanceTo(enemy.position) < 0.2) {
                                    shatterEnemy(enemy); // 接触した敵を粉砕！
                                }
                            }
                        });
                    }
                }
            });

            // 軌跡のライフサイクル管理（数秒後に消滅）
            for (let i = trails.length - 1; i >= 0; i--) {
                const trail = trails[i];
                if (trail.isFinished) {
                    trail.age += 0.02;
                    trail.mesh.material.opacity = 1.0 - (trail.age / 2.0); // 2秒かけてフェードアウト
                    
                    if (trail.age >= 2.0) {
                        scene.remove(trail.mesh);
                        trail.mesh.geometry.dispose();
                        trail.mesh.material.dispose();
                        trails.splice(i, 1);
                    }
                }
            }

            // 破片（パーティクル）の物理挙動
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.position.add(p.userData.velocity);
                p.rotation.x += 0.2;
                p.userData.life -= 0.02;
                p.scale.setScalar(p.userData.life);
                
                if(p.userData.life <= 0) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            }

            // 敵の浮遊とスポーン管理
            let activeCount = 0;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (enemy.userData.isDead) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                } else {
                    activeCount++;
                    enemy.position.y += Math.sin(time * 3 + enemy.userData.floatOffset) * 0.002;
                    enemy.rotation.y += enemy.userData.rotSpeed;
                }
            }

            if (activeCount < 30) {
                for(let i = 0; i < 60 - enemies.length; i++) spawnEnemy();
            }

            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
