<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Atom Sculptor: Unchained - Prototype</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { VRButton } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/webxr/VRButton.js';

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 2, 15);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        // --- ネオン・ライティング ---
        const amb = new THREE.AmbientLight(0x404040);
        const point = new THREE.PointLight(0x00ffff, 2, 10);
        scene.add(amb, point);

        // --- ボスの生成 (結合体の塊) ---
        const fragments = [];
        const fragGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
        
        function createBoss() {
            for(let i = 0; i < 50; i++) {
                const mat = new THREE.MeshBasicMaterial({ 
                    color: i % 2 === 0 ? 0xff00ff : 0x00ffff, 
                    wireframe: true 
                });
                const cube = new THREE.Mesh(fragGeo, mat);
                cube.position.set(
                    (Math.random() - 0.5) * 2,
                    1.5 + (Math.random() - 0.5) * 2,
                    -2 + (Math.random() - 0.5) * 2
                );
                cube.userData.velocity = new THREE.Vector3(0, 0, 0);
                cube.userData.isDead = false;
                scene.add(cube);
                fragments.push(cube);
            }
        }
        createBoss();

        // --- 武器：光の刃 (Right Controller) ---
        const controller = renderer.xr.getController(1); // 右手
        scene.add(controller);

        const bladeGeo = new THREE.CylinderGeometry(0.005, 0.02, 1, 8);
        const bladeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.8 });
        const blade = new THREE.Mesh(bladeGeo, bladeMat);
        blade.rotation.x = -Math.PI / 2;
        blade.position.z = -0.5;
        controller.add(blade);

        // --- 解体（パージ）ロジック ---
        function onSlicing() {
            const bladeTip = new THREE.Vector3();
            bladeTip.setFromMatrixPosition(blade.matrixWorld);

            fragments.forEach(frag => {
                if (!frag.userData.isDead) {
                    const dist = bladeTip.distanceTo(frag.position);
                    if (dist < 0.3) {
                        // 解体開始！
                        frag.userData.isDead = true;
                        frag.userData.velocity.set(
                            (Math.random() - 0.5) * 0.2,
                            (Math.random() - 0.5) * 0.2,
                            (Math.random() - 0.5) * 0.2
                        );
                    }
                }
            });
        }

        // --- メインループ ---
        renderer.setAnimationLoop(() => {
            onSlicing();

            // 破片の挙動
            fragments.forEach(frag => {
                if (frag.userData.isDead) {
                    frag.position.add(frag.userData.velocity);
                    frag.rotation.x += 0.1;
                    frag.rotation.y += 0.1;
                    frag.scale.multiplyScalar(0.98); // 徐々に消える（光の雪へ）
                } else {
                    // ボスの鼓動感
                    frag.position.y += Math.sin(Date.now() * 0.002) * 0.002;
                }
            });

            renderer.render(scene, camera);
        });

    </script>
</body>
</html>
