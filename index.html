<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Atom Sculptor: Hyper Beam</title>
    <style>body { margin: 0; background-color: #000; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 15);
        
        const playerRig = new THREE.Group();
        scene.add(playerRig);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        playerRig.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const p1 = new THREE.PointLight(0xff00ff, 2, 10); p1.position.set(2, 2, 0);
        const p2 = new THREE.PointLight(0x00ffff, 2, 10); p2.position.set(-2, 2, 0);
        playerRig.add(p1, p2, new THREE.AmbientLight(0x333333));

        // --- 状態管理 ---
        let energy = 0; // 0 to 100
        let isBeamFiring = false;
        let dashVelocity = new THREE.Vector3();

        // --- 1. 敵とエフェクト ---
        const enemies = [];
        const particles = [];
        const fragGeo = new THREE.BoxGeometry(0.18, 0.18, 0.18);
        
        function spawnEnemy(dist = 0) {
            const mat = new THREE.MeshBasicMaterial({ color: Math.random() > 0.5 ? 0x00ffff : 0xff00ff, wireframe: true });
            const enemy = new THREE.Mesh(fragGeo, mat);
            const angle = Math.random() * Math.PI * 2;
            const r = 1.0 + Math.random() * 3.0 + dist;
            enemy.position.set(playerRig.position.x + Math.cos(angle) * r, 0.5 + Math.random() * 2, playerRig.position.z + Math.sin(angle) * r);
            enemy.userData = { isDead: false, rotSpeed: (Math.random()-0.5)*0.04, floatOffset: Math.random()*10, color: mat.color };
            scene.add(enemy);
            enemies.push(enemy);
        }
        for(let i=0; i<80; i++) spawnEnemy();

        function shatterEnemy(enemy) {
            enemy.userData.isDead = true; enemy.visible = false;
            for(let i=0; i<6; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.04, 0.04), new THREE.MeshBasicMaterial({ color: enemy.userData.color }));
                p.position.copy(enemy.position);
                p.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*0.15, (Math.random()-0.5)*0.15, (Math.random()-0.5)*0.15), state: 'scatter' };
                scene.add(p);
                particles.push(p);
            }
        }

        // --- 2. ビーム・ビジュアル ---
        const beamGeo = new THREE.CylinderGeometry(0.05, 0.05, 10, 12);
        const beamMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const beamMesh = new THREE.Mesh(beamGeo, beamMat);
        beamMesh.rotation.x = -Math.PI / 2;
        beamMesh.position.z = -5;
        beamMesh.visible = false;

        // --- 3. コントローラー設定 ---
        function setupController(index, colorHex) {
            const ctrl = renderer.xr.getController(index);
            playerRig.add(ctrl);
            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.01, 8, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
            tip.position.z = -0.05;
            ctrl.add(tip);
            ctrl.add(beamMesh.clone()); // 各手にビーム予備を（実際は1つのみ表示）

            ctrl.userData = { isDrawing: false, points: [], weapon: null, isSqueezing: false };
            ctrl.addEventListener('selectstart', () => { 
                if(energy >= 100) { isBeamFiring = true; } 
                else { ctrl.userData.isDrawing = true; ctrl.userData.points = []; }
            });
            ctrl.addEventListener('selectend', () => { 
                isBeamFiring = false; 
                ctrl.userData.isDrawing = false; 
                createWeapon(ctrl, colorHex);
            });
            ctrl.addEventListener('squeezestart', () => ctrl.userData.isSqueezing = true);
            ctrl.addEventListener('squeezeend', () => ctrl.userData.isSqueezing = false);
            return ctrl;
        }

        function createWeapon(ctrl, colorHex) {
            const pts = ctrl.userData.points;
            if (pts.length < 2) return;
            if (ctrl.userData.weapon) ctrl.remove(ctrl.userData.weapon);
            const localPts = pts.map(p => ctrl.worldToLocal(p.clone()));
            const tubeGeo = new THREE.TubeGeometry(new THREE.CatmullRomCurve3(localPts), localPts.length*2, 0.02, 8, false);
            const weapon = new THREE.Mesh(tubeGeo, new THREE.MeshBasicMaterial({ color: colorHex }));
            weapon.userData.pointsLocal = localPts;
            ctrl.add(weapon);
            ctrl.userData.weapon = weapon;
        }

        const h1 = setupController(0, 0x00ffff);
        const h2 = setupController(1, 0xff00ff);

        // --- 4. メインループ ---
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();
            const camPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);

            // ダッシュ（速度を0.1に抑制）
            let dashing = false;
            [h1, h2].forEach(h => { if(h.userData.isSqueezing) {
                dashing = true;
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(h.quaternion).normalize();
                dashVelocity.lerp(dir.multiplyScalar(0.12), 0.1); // 前回の0.2から0.12へ
            }});
            if(dashing) playerRig.position.add(dashVelocity);
            else { dashVelocity.lerp(new THREE.Vector3(), 0.1); playerRig.position.add(dashVelocity); }

            // ビーム処理
            beamMesh.visible = isBeamFiring;
            if(isBeamFiring) {
                const activeHand = h1.userData.isDrawing ? h1 : h2; // 引いている方の手
                beamMesh.position.setFromMatrixPosition(activeHand.matrixWorld);
                beamMesh.quaternion.setFromRotationMatrix(activeHand.matrixWorld);
                beamMesh.translateZ(-5);
                scene.add(beamMesh); // シーンに一時的に追加
                
                // ビーム当たり判定（Raycast的）
                const beamDir = new THREE.Vector3(0,0,-1).applyQuaternion(activeHand.quaternion).normalize();
                enemies.forEach(e => {
                    const toEnemy = e.position.clone().sub(camPos);
                    const distToLine = toEnemy.clone().cross(beamDir).length();
                    if(distToLine < 0.3 && toEnemy.dot(beamDir) > 0) shatterEnemy(e);
                });
                energy -= 1.5; // 消費
                if(energy <= 0) { energy = 0; isBeamFiring = false; }
            } else {
                if(scene.children.includes(beamMesh)) scene.remove(beamMesh);
            }

            // スカルプト描画・通常斬撃
            [h1, h2].forEach(h => {
                const tipPos = new THREE.Vector3().setFromMatrixPosition(h.children[0].matrixWorld);
                if(h.userData.isDrawing) {
                    if(h.userData.points.length === 0 || tipPos.distanceTo(h.userData.points[h.userData.points.length-1]) > 0.02) {
                        h.userData.points.push(tipPos.clone());
                    }
                }
                if(h.userData.weapon) {
                    const pts = h.userData.weapon.userData.pointsLocal;
                    for(let i=0; i<pts.length-1; i++) {
                        const pS = pts[i].clone().applyMatrix4(h.matrixWorld);
                        const pE = pts[i+1].clone().applyMatrix4(h.matrixWorld);
                        const line = new THREE.Line3(pS, pE);
                        const close = new THREE.Vector3();
                        enemies.forEach(e => {
                            if(!e.userData.isDead) {
                                line.closestPointToPoint(e.position, true, close);
                                if(close.distanceTo(e.position) < 0.15) shatterEnemy(e);
                            }
                        });
                    }
                }
            });

            // アブソーブ（エネルギーチャージ）
            for(let i=particles.length-1; i>=0; i--) {
                const p = particles[i];
                if(p.userData.state === 'scatter') {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.multiplyScalar(0.95);
                    if(p.userData.velocity.lengthSq() < 0.001) p.userData.state = 'homing';
                } else {
                    p.position.lerp(camPos, 0.1);
                    if(p.position.distanceTo(camPos) < 0.2) {
                        scene.remove(p); particles.splice(i,1);
                        energy = Math.min(100, energy + 1.2); // チャージ！
                    }
                }
            }

            // 敵管理
            let count = 0;
            for(let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                if(e.userData.isDead) { scene.remove(e); enemies.splice(i,1); }
                else {
                    count++;
                    e.position.y += Math.sin(time*3+e.userData.floatOffset)*0.002;
                    e.rotation.y += e.userData.rotSpeed;
                }
            }
            if(count < 50) for(let i=0; i<80-count; i++) spawnEnemy(dashing?10:0);

            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
