<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Atom Sculptor: High-Speed Assault</title>
    <style>body { margin: 0; background-color: #000; overflow: hidden; }</style>
</head>
<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.136.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.136.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        // 敵が暗闇から急に現れるような演出のためのフォグ調整
        scene.fog = new THREE.Fog(0x000000, 5, 30);
        
        const playerRig = new THREE.Group();
        scene.add(playerRig);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        playerRig.add(camera);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.xr.enabled = true;
        document.body.appendChild(renderer.domElement);
        document.body.appendChild(VRButton.createButton(renderer));

        const p1 = new THREE.PointLight(0xff00ff, 2, 10); p1.position.set(2, 2, 0);
        const p2 = new THREE.PointLight(0x00ffff, 2, 10); p2.position.set(-2, 2, 0);
        playerRig.add(p1, p2, new THREE.AmbientLight(0x333333));

        // --- 固定パラメータ ---
        const WEAPON_RADIUS = 0.015; // 鋭く細い固定の刃
        let dashVelocity = new THREE.Vector3();

        // --- 1. プロシージャル・エネミーシステム ---
        const enemies = [];
        const particles = [];
        
        // 攻撃的な幾何学形状（正四面体と正八面体）
        const tetraGeo = new THREE.TetrahedronGeometry(0.25);
        const octaGeo = new THREE.OctahedronGeometry(0.2);
        const particleGeo = new THREE.TetrahedronGeometry(0.05); // 破片も尖らせる

        function spawnEnemy(distanceOffset = 0) {
            const isCyan = Math.random() > 0.5;
            const isTetra = Math.random() > 0.5;
            const mat = new THREE.MeshBasicMaterial({ color: isCyan ? 0x00ffff : 0xff00ff, wireframe: true });
            const enemy = new THREE.Mesh(isTetra ? tetraGeo : octaGeo, mat);
            
            // プレイヤーから15m〜25m離れた全方位にスポーン
            const angle = Math.random() * Math.PI * 2;
            const heightAngle = (Math.random() - 0.5) * Math.PI * 0.5; // 上下の角度
            const radius = 15.0 + Math.random() * 10.0 + distanceOffset;
            
            const playerPos = playerRig.position;
            enemy.position.set(
                playerPos.x + Math.cos(angle) * Math.cos(heightAngle) * radius, 
                playerPos.y + 1.5 + Math.sin(heightAngle) * radius, 
                playerPos.z + Math.sin(angle) * Math.cos(heightAngle) * radius
            );

            // 【新機能】プレイヤーの頭を狙う「突進ベクトル」の計算
            const targetPos = new THREE.Vector3(playerPos.x, playerPos.y + 1.5, playerPos.z);
            // 予測撃ち：少しだけランダムにズラして、完全に一直線にならないようにする
            targetPos.x += (Math.random() - 0.5) * 2.0;
            targetPos.y += (Math.random() - 0.5) * 1.0;
            
            const moveDir = targetPos.clone().sub(enemy.position).normalize();
            const speed = 0.1 + Math.random() * 0.08; // 音速感のある超高速
            
            enemy.userData = { 
                isDead: false, 
                velocity: moveDir.multiplyScalar(speed), // 突進ベクトルを保存
                rotSpeedX: (Math.random() - 0.5) * 0.2, 
                rotSpeedY: (Math.random() - 0.5) * 0.2, 
                color: mat.color 
            };
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        // 初期スポーン
        for(let i = 0; i < 40; i++) spawnEnemy();

        function shatterEnemy(enemy) {
            enemy.userData.isDead = true;
            enemy.visible = false;
            for(let i = 0; i < 6; i++) {
                const p = new THREE.Mesh(particleGeo, new THREE.MeshBasicMaterial({ color: enemy.userData.color }));
                p.position.copy(enemy.position);
                p.userData = {
                    velocity: new THREE.Vector3((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3),
                    state: 'scatter'
                };
                scene.add(p);
                particles.push(p);
            }
        }

        // --- 2. スカルプト＆ダッシュ システム ---
        function setupController(index, colorHex) {
            const controller = renderer.xr.getController(index);
            playerRig.add(controller);

            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.015, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
            tip.position.z = -0.05;
            controller.add(tip);

            const matPreview = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            const matWeapon = new THREE.MeshBasicMaterial({ color: colorHex });

            controller.userData = { isDrawing: false, isDashing: false, pointsWorld: [], previewMesh: null, weaponMesh: null };

            controller.addEventListener('selectstart', () => {
                controller.userData.isDrawing = true;
                controller.userData.pointsWorld = [];
                if (controller.userData.previewMesh) { scene.remove(controller.userData.previewMesh); controller.userData.previewMesh = null; }
            });

            controller.addEventListener('selectend', () => {
                controller.userData.isDrawing = false;
                if (controller.userData.previewMesh) { scene.remove(controller.userData.previewMesh); controller.userData.previewMesh = null; }

                if (controller.userData.pointsWorld.length > 1) {
                    if (controller.userData.weaponMesh) controller.remove(controller.userData.weaponMesh);
                    const ptsLocal = controller.userData.pointsWorld.map(p => controller.worldToLocal(p.clone()));
                    const curve = new THREE.CatmullRomCurve3(ptsLocal);
                    const tubeGeo = new THREE.TubeGeometry(curve, ptsLocal.length * 2, WEAPON_RADIUS, 8, false);
                    const weapon = new THREE.Mesh(tubeGeo, matWeapon);
                    weapon.userData.pointsLocal = ptsLocal; 
                    controller.add(weapon);
                    controller.userData.weaponMesh = weapon;
                }
            });

            controller.addEventListener('squeezestart', () => { controller.userData.isDashing = true; });
            controller.addEventListener('squeezeend', () => { controller.userData.isDashing = false; });

            return { controller, tip, matPreview };
        }

        const h1 = setupController(0, 0x00ffff);
        const h2 = setupController(1, 0xff00ff);

        // --- 3. メインループ ---
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
            const time = clock.getElapsedTime();
            const cameraPos = new THREE.Vector3().setFromMatrixPosition(camera.matrixWorld);

            // ダッシュ移動
            let isAnyDashing = false;
            [h1, h2].forEach(hand => {
                if (hand.controller.userData.isDashing) {
                    isAnyDashing = true;
                    const dashDir = new THREE.Vector3(0, 0, -1).applyQuaternion(hand.controller.quaternion).normalize();
                    dashVelocity.lerp(dashDir.multiplyScalar(0.1), 0.1); 
                }
            });
            if (isAnyDashing) playerRig.position.add(dashVelocity);
            else { dashVelocity.lerp(new THREE.Vector3(0,0,0), 0.1); playerRig.position.add(dashVelocity); }

            // スカルプト判定
            [h1, h2].forEach(hand => {
                const ctrl = hand.controller;
                const tipPosWorld = new THREE.Vector3().setFromMatrixPosition(hand.tip.matrixWorld);

                if (ctrl.userData.isDrawing) {
                    const pts = ctrl.userData.pointsWorld;
                    if (pts.length === 0 || tipPosWorld.distanceTo(pts[pts.length - 1]) > 0.02) {
                        pts.push(tipPosWorld.clone());
                        if (pts.length > 1) {
                            if (ctrl.userData.previewMesh) scene.remove(ctrl.userData.previewMesh);
                            const curve = new THREE.CatmullRomCurve3(pts);
                            ctrl.userData.previewMesh = new THREE.Mesh(
                                new THREE.TubeGeometry(curve, pts.length * 2, WEAPON_RADIUS, 8, false), hand.matPreview
                            );
                            scene.add(ctrl.userData.previewMesh);
                        }
                    }
                }

                if (ctrl.userData.weaponMesh) {
                    const ptsLocal = ctrl.userData.weaponMesh.userData.pointsLocal;
                    if (ptsLocal && ptsLocal.length > 1) {
                        const hitRadius = WEAPON_RADIUS * 6.0 + 0.1; // 刃の当たり判定は少し広めに
                        for (let i = 0; i < ptsLocal.length - 1; i++) {
                            const pStart = ptsLocal[i].clone().applyMatrix4(ctrl.matrixWorld);
                            const pEnd = ptsLocal[i+1].clone().applyMatrix4(ctrl.matrixWorld);
                            const lineSegment = new THREE.Line3(pStart, pEnd);
                            const closest = new THREE.Vector3();

                            enemies.forEach(enemy => {
                                if (!enemy.userData.isDead) {
                                    lineSegment.closestPointToPoint(enemy.position, true, closest);
                                    if (closest.distanceTo(enemy.position) < hitRadius) {
                                        shatterEnemy(enemy);
                                    }
                                }
                            });
                        }
                    }
                }
            });

            // 破片エフェクト
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.userData.state === 'scatter') {
                    p.position.add(p.userData.velocity);
                    p.userData.velocity.multiplyScalar(0.92);
                    if (p.userData.velocity.lengthSq() < 0.001) p.userData.state = 'homing';
                } else {
                    p.position.lerp(cameraPos, 0.1);
                    if (p.position.distanceTo(cameraPos) < 0.3) {
                        scene.remove(p);
                        particles.splice(i, 1);
                        // ※太くする機能は廃止。吸い込む演出のみ。
                    }
                }
                p.rotation.x += 0.2; p.rotation.y += 0.2;
            }

            // 敵の高速突進とスポーン管理
            let activeCount = 0;
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                if (enemy.userData.isDead) {
                    scene.remove(enemy);
                    enemies.splice(i, 1);
                } else {
                    activeCount++;
                    // 浮遊ではなく、プレイヤーに向かって高速突進！
                    enemy.position.add(enemy.userData.velocity);
                    enemy.rotation.x += enemy.userData.rotSpeedX;
                    enemy.rotation.y += enemy.userData.rotSpeedY;
                    
                    // プレイヤーを通り過ぎて遠くへ行ったら消去
                    if (enemy.position.distanceTo(playerRig.position) > 40) {
                        enemy.userData.isDead = true;
                    }
                }
            }
            // 敵の数を常に維持
            if (activeCount < 40) {
                for(let i = 0; i < 60 - activeCount; i++) spawnEnemy(dashVelocity.length() > 0.05 ? 15 : 0);
            }

            renderer.render(scene, camera);
        });
    </script>
</body>
</html>
